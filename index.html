<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>单界面多按钮示例</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      background: #f3f4f6;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .app {
      max-width: 1000px;
      width: 100%;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
      padding: 24px 28px 28px;
    }
    .app-header {
      margin-bottom: 20px;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 16px;
    }
    .app-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .app-subtitle {
      font-size: 14px;
      color: #6b7280;
    }
    .app-body {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 20px;
    }
    @media (max-width: 768px) {
      .app-body {
        grid-template-columns: 1fr;
      }
    }
    .button-panel {
      border-right: 1px solid #e5e7eb;
      padding-right: 16px;
    }
    @media (max-width: 768px) {
      .button-panel {
        border-right: none;
        border-bottom: 1px solid #e5e7eb;
        padding-right: 0;
        padding-bottom: 16px;
      }
    }
    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: #4b5563;
      margin-bottom: 10px;
    }
    .btn-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #111827;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn:hover {
      background: #e5f0ff;
      border-color: #3b82f6;
      color: #1d4ed8;
      transform: translateY(-1px);
    }
    .btn.active {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      border-color: transparent;
      color: #ffffff;
      box-shadow: 0 8px 16px rgba(37, 99, 235, 0.35);
    }
    .btn span {
      font-weight: 600;
      margin-right: 4px;
    }
    .content-panel {
      padding-left: 4px;
    }
    .content-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .content-desc {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 16px;
    }
    .content-box {
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      padding: 16px 18px;
      min-height: 120px;
      font-size: 14px;
      line-height: 1.7;
    }
    .content-note {
      margin-top: 12px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="app-title">单界面多按钮示例</div>
      <div class="app-subtitle">点击左侧不同按钮，在右侧显示不同内容（可自定义为你需要的功能）。</div>
    </header>

    <main class="app-body">
      <aside class="button-panel">
        <div class="panel-title">功能按钮</div>
        <div class="btn-list">
          <button class="btn active" data-id="1"><span>按钮 1</span>欢迎介绍</button>
          <button class="btn" data-id="2"><span>按钮 2</span>使用说明</button>
          <button class="btn" data-id="3"><span>按钮 3</span>示例操作</button>
          <button class="btn" data-id="4"><span>按钮 4</span>关于作者</button>
        </div>
      </aside>

      <section class="content-panel">
        <div id="content-title" class="content-title">欢迎使用本工具</div>
        <div id="content-desc" class="content-desc">这是一个示例页面，展示如何在单个网页中使用多个按钮切换内容。</div>
        <div id="content-box" class="content-box">
          欢迎来到单界面多按钮示例页面。<br />
          - 左侧有多个按钮，每个对应一块不同的内容。<br />
          - 你可以根据自己的业务，把这些按钮改成「功能一、功能二、查询、下载」等。<br />
          - 右侧区域则展示对应的说明或结果。
        </div>
        <div class="content-note">你可以直接修改 HTML 中的文字内容和按钮数量，以适配自己的需求。</div>
      </section>
    </main>
  </div>

  <script>
    const data = {
      1: {
        title: "欢迎使用本工具",
        desc: "这是一个示例页面，展示如何在单个网页中使用多个按钮切换内容。",
        html: `欢迎来到单界面多按钮示例页面。<br />
              - 左侧有多个按钮，每个对应一块不同的内容。<br />
              - 你可以根据自己的业务，把这些按钮改成「功能一、功能二、查询、下载」等。<br />
              - 右侧区域则展示对应的说明或结果。`
      },
      2: {
        title: "使用说明",
        desc: "下面是你可以如何基于这个模板定制自己的功能。",
        html: `1. 修改按钮文字：直接在 HTML 中搜索“按钮 1 / 按钮 2 ...”，改成你想要的标题。<br />
              2. 修改右侧内容：在 JavaScript 的 data 对象里，修改对应的 title / desc / html。<br />
              3. 添加或删除按钮：复制或删除一个 <code>&lt;button&gt;</code> 元素，并在 data 中添加/删除对应条目。<br />
              4. 最后把整个文件上传到 GitHub，开启 GitHub Pages 即可对外访问。`
      },
      3: {
        title: "示例操作",
        desc: "这里可以展示一个简单的“操作步骤”或“结果展示”。",
        html: `例如：<br />
              - 第一步：用户上传文件 / 输入内容 / 选择选项。<br />
              - 第二步：你在前端做简单处理，或者把请求发到后端 API。<br />
              - 第三步：在这里显示处理结果、统计信息或下载链接。<br /><br />
              目前这个示例不调用真实接口，只是展示文字。你可以根据需要接入自己的后端。`
      },
      4: {
        title: "关于作者 / 项目说明",
        desc: "你可以在这里放置项目背景、作者信息或联系邮箱。",
        html: `示例：<br />
              - 项目名称：单界面多按钮演示<br />
              - 作者：你的名字<br />
              - 联系方式：your_email@example.com<br />
              - 开源协议 / 使用说明：自由使用，禁止商用 / 允许商用（请根据实际情况填写）。`
      }
    };

    const buttons = document.querySelectorAll(".btn");
    const titleEl = document.getElementById("content-title");
    const descEl = document.getElementById("content-desc");
    const boxEl = document.getElementById("content-box");

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-id");

        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        const item = data[id];
        if (item) {
          titleEl.textContent = item.title;
          descEl.textContent = item.desc;
          boxEl.innerHTML = item.html;
        }
      });
    });
  </script>
</body>
</html>
